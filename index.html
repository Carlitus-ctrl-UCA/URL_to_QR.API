<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta description="Generador de códigos QR para URLs. Convierte cualquier enlace en un código QR de forma rápida y sencilla. Ideal para compartir enlaces de manera visual y accesible.">
    <meta keywords="generador de QR, código QR, QR para URLs, compartir enlaces, QR fácil, QR rápido">
    <title>Generador de QR</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⊞</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script> <!-- Agregamos Tailwind para ahorraros tiempo en estilos y que quede bonito sin tener que tocar CSS. Si quieres, puedes eliminar esta línea y escribir tu propio CSS en un archivo separado.-->
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-lg w-96">
        <h1 class="text-2xl font-bold mb-6 text-center text-gray-800 flex items-center justify-center gap-2">
            <i class="fas fa-qrcode"></i>
            QR Generator
        </h1>
        
        <input type="text" id="urlInput" placeholder="https://tu-web.com" 
               class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        
        <button onclick="generateQR()" 
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
            Generar Código QR
        </button>

        <div id="result" class="mt-6 flex justify-center hidden">
            <img id="qrImage" src="" alt="Tu QR" class="border-4 border-gray-50">
        </div>
    </div>

    <script>
        async function generateQR() {
            const url = document.getElementById('urlInput').value;
            const resultadoDiv = document.getElementById('result');
            const ImagenQR = document.getElementById('qrImage');

            const response = await fetch('http://127.0.0.1:8000/generate-qr', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url, scale: 10 })
            });

            if (response.ok) {
                const blob = await response.blob();
                ImagenQR.src = URL.createObjectURL(blob);
                resultadoDiv.classList.remove('hidden');
            } else {
                alert("Error: Asegúrate de poner una URL válida (con https://)");
            }
        }
    </script>
</body>
</html>
